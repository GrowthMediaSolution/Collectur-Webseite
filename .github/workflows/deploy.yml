name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build
        run: npm run build

      - name: Assemble standalone bundle
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Derive project name from repo
        id: proj
        run: |
          REPO="${GITHUB_REPOSITORY}"
          NAME="${REPO#*/}"
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /var/www/${{ steps.proj.outputs.name }}"

      - name: Deploy to VPS (rsync)
        run: |
          rsync -avz --delete .next/standalone/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/${{ steps.proj.outputs.name }}/"

      - name: Write .env on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "echo 'SMTP_PASS=${{ secrets.SMTP_PASS }}' > /var/www/${{ steps.proj.outputs.name }}/.env"

      - name: Restart app with pm2
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /var/www/${{ steps.proj.outputs.name }} && \
             pm2 stop ${{ steps.proj.outputs.name }} 2>/dev/null || true && \
             pm2 delete ${{ steps.proj.outputs.name }} 2>/dev/null || true && \
             fuser -k 3020/tcp 2>/dev/null || true && \
             sleep 2 && \
             PORT=3020 pm2 start server.js --name ${{ steps.proj.outputs.name }} && \
             pm2 save"

      - name: Diagnose VPS state
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            sleep 3;
            pm2 logs Collectur-Webseite --lines 10 --nostream 2>&1;
            echo '=== PORTS ===';
            ss -anp | grep 3020;
            echo '=== APACHE ROOT ===';
            grep -r 'collectus\|entruempelung\|3020\|3000\|DocumentRoot\|ProxyPass' /etc/apache2/ 2>/dev/null | grep -v '.dpkg\|Binary' | head -20;
          "
