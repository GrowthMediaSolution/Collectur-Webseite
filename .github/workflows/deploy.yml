name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build
        run: npm run build

      - name: Assemble standalone bundle
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Derive project name from repo
        id: proj
        run: |
          REPO="${GITHUB_REPOSITORY}"
          NAME="${REPO#*/}"
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /var/www/${{ steps.proj.outputs.name }}"

      - name: Deploy to VPS (rsync)
        run: |
          rsync -avz --delete .next/standalone/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/${{ steps.proj.outputs.name }}/"

      - name: Write .env on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "echo 'SMTP_PASS=${{ secrets.SMTP_PASS }}' > /var/www/${{ steps.proj.outputs.name }}/.env"

      - name: Restart app with pm2
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /var/www/${{ steps.proj.outputs.name }} && \
             pm2 stop ${{ steps.proj.outputs.name }} 2>/dev/null || true && \
             sleep 2 && \
             pm2 delete ${{ steps.proj.outputs.name }} 2>/dev/null || true && \
             PORT=3020 pm2 start server.js --name ${{ steps.proj.outputs.name }} && \
             pm2 save"

      - name: Diagnose VPS state
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            echo '=== PANEL ===';
            which plesk 2>/dev/null || which cpanel 2>/dev/null || ls /usr/local/cpanel 2>/dev/null || ls /opt/plesk 2>/dev/null || echo 'no known panel';
            echo '=== APACHE VHOSTS ===';
            find /var/www/vhosts /etc/apache2/plesk.conf.d /etc/httpd/conf.d /usr/local/apache/conf/vhosts -name '*collectus*' -o -name '*entruempelung*' 2>/dev/null | head -5;
            find /var/www/vhosts -maxdepth 2 -name 'conf' -type d 2>/dev/null | head -10;
            echo '=== COLLECTUS DIR ===';
            ls /var/www/Collectur-Webseite/ | head -10;
            echo '=== PORTS ===';
            ss -tlnp | grep -v '3000\|3334\|43737\|34455' | grep node
          "
