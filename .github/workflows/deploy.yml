name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build
        run: npm run build

      - name: Assemble standalone bundle
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Derive project name from repo
        id: proj
        run: |
          REPO="${GITHUB_REPOSITORY}"
          NAME="${REPO#*/}"
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /var/www/${{ steps.proj.outputs.name }}"

      - name: Deploy to VPS (rsync)
        run: |
          rsync -avz --delete .next/standalone/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/${{ steps.proj.outputs.name }}/"

      - name: Write .env on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "echo 'SMTP_PASS=${{ secrets.SMTP_PASS }}' > /var/www/${{ steps.proj.outputs.name }}/.env"

      - name: Restart app with pm2
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /var/www/${{ steps.proj.outputs.name }} && \
             pm2 stop ${{ steps.proj.outputs.name }} 2>/dev/null || true && \
             pm2 delete ${{ steps.proj.outputs.name }} 2>/dev/null || true && \
             fuser -k 3020/tcp 2>/dev/null || true && \
             sleep 2 && \
             PORT=3020 pm2 start server.js --name ${{ steps.proj.outputs.name }} && \
             pm2 save"

      - name: Configure Apache reverse proxy
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            # Create Apache vhost config for collectus-entruempelung.de
            cat > /tmp/collectus-entruempelung.conf << 'APACHEEOF'
<VirtualHost *:80>
    ServerName collectus-entruempelung.de
    ServerAlias www.collectus-entruempelung.de

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3020/
    ProxyPassReverse / http://127.0.0.1:3020/

    ErrorLog \${APACHE_LOG_DIR}/collectus-error.log
    CustomLog \${APACHE_LOG_DIR}/collectus-access.log combined
</VirtualHost>
APACHEEOF
            sudo mv /tmp/collectus-entruempelung.conf /etc/apache2/sites-available/collectus-entruempelung.conf
            sudo a2enmod proxy proxy_http 2>/dev/null || true
            sudo a2ensite collectus-entruempelung 2>/dev/null || true
            sudo apache2ctl configtest && sudo systemctl reload apache2 || true
          "

      - name: Diagnose VPS state
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            sleep 3;
            echo '=== PM2 STATUS ===';
            pm2 list 2>&1 | grep -E 'Collect|id';
            echo '=== PORT 3020 ===';
            ss -anp | grep 3020;
            echo '=== APACHE CHECK ===';
            sudo apache2ctl -S 2>&1 | grep -i 'collectus\|entruempelung\|error' | head -5;
          "
